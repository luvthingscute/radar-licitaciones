name: Actualizar dashboard Shiny

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # GitHub Actions usa UTC. Se dispara a las 09:00 y 10:00 UTC,
    # pero solo continua cuando en America/Santiago son las 06:00.
    - cron: "0 9,10 * * *"
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Revisar hora de Chile
        id: chile_time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_update=true" >> "$GITHUB_OUTPUT"
          elif [ "$(TZ=America/Santiago date +%H)" = "06" ]; then
            echo "run_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Descargar repositorio
        if: steps.chile_time.outputs.run_update == 'true'
        uses: actions/checkout@v4

      - name: Instalar R
        if: steps.chile_time.outputs.run_update == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Instalar dependencias del sistema
        if: steps.chile_time.outputs.run_update == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libpng-dev libjpeg-dev

      - name: Instalar paquetes R
        if: steps.chile_time.outputs.run_update == 'true'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1

      - name: Verificar paquetes R
        if: steps.chile_time.outputs.run_update == 'true'
        run: |
          Rscript -e "source('global.R'); cat('Paquetes R OK\n')"

      - name: Verificar secrets shinyapps.io
        if: steps.chile_time.outputs.run_update == 'true'
        id: shinyapps_secrets
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        shell: bash
        run: |
          if [ -n "$SHINYAPPS_ACCOUNT" ] && [ -n "$SHINYAPPS_TOKEN" ] && [ -n "$SHINYAPPS_SECRET" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Actualizacion no publicada"
              echo ""
              echo "Faltan secrets de shinyapps.io en GitHub:"
              echo "- SHINYAPPS_ACCOUNT"
              echo "- SHINYAPPS_TOKEN"
              echo "- SHINYAPPS_SECRET"
              echo ""
              echo "Cuando esten creados, el workflow podra actualizar y publicar automaticamente."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Verificar conexion shinyapps.io
        if: steps.chile_time.outputs.run_update == 'true' && steps.shinyapps_secrets.outputs.configured == 'true'
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: |
          Rscript -e "rsconnect::setAccountInfo(name=Sys.getenv('SHINYAPPS_ACCOUNT'), token=Sys.getenv('SHINYAPPS_TOKEN'), secret=Sys.getenv('SHINYAPPS_SECRET')); print(rsconnect::accounts()); apps <- rsconnect::applications(account=Sys.getenv('SHINYAPPS_ACCOUNT')); if (nrow(apps)) print(apps[, c('name','url')]) else message('Cuenta valida, sin aplicaciones listadas.')"

      - name: Actualizar cache
        if: steps.chile_time.outputs.run_update == 'true' && steps.shinyapps_secrets.outputs.configured == 'true'
        run: Rscript update_cache.R

      - name: Publicar en shinyapps.io
        if: steps.chile_time.outputs.run_update == 'true' && steps.shinyapps_secrets.outputs.configured == 'true'
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
        run: Rscript deploy_shinyapps.R
